name: Build & Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  server-plugin:
    name: Server Plugin (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history for git describe
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11
      - name: Build and test
        working-directory: groovy-server-plugin
        run: ./build.sh
      - name: Upload plugin JAR
        uses: actions/upload-artifact@v7
        with:
          name: quantrix-server
          path: groovy-server-plugin/dist/quantrix-server-*.jar

  loader-plugin:
    name: Loader Plugin (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11
      - name: Build (using stubs)
        working-directory: groovy-loader-plugin
        run: ./build.sh
      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: groovy-loader-plugin
          path: groovy-loader-plugin/dist/groovy-loader-plugin-*.jar

  skills:
    name: Package skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Validate skill frontmatter
        run: |
          for skill_dir in skills/*/; do
            [ -f "$skill_dir/SKILL.md" ] || continue
            skill_name=$(basename "$skill_dir")
            # Extract YAML frontmatter between --- fences and check required fields
            frontmatter=$(awk '/^---$/{if(++n==2)exit}n==1' "$skill_dir/SKILL.md")
            echo "$frontmatter" | grep -q "^name:" || { echo "FAIL: $skill_name missing name"; exit 1; }
            echo "$frontmatter" | grep -q "^description:" || { echo "FAIL: $skill_name missing description"; exit 1; }
            echo "OK: $skill_name"
          done
      - name: Compile-check Python scripts
        run: |
          found=0
          for py in $(find skills -name '*.py' -not -path '*/__pycache__/*'); do
            python -m py_compile "$py"
            echo "OK: $py"
            found=$((found + 1))
          done
          echo "Compiled $found Python script(s)"
      - name: Package each skill as .skill file
        run: |
          mkdir -p dist
          for skill_dir in skills/*/; do
            [ -f "$skill_dir/SKILL.md" ] || continue
            skill_name=$(basename "$skill_dir")
            cd skills
            zip -r "../dist/${skill_name}.skill" "$skill_name" \
              -x '*/__pycache__/*' '*/.DS_Store' '*/evals/*'
            cd ..
            echo "Packaged: ${skill_name}.skill"
          done
          ls -lh dist/
      - name: Upload skill packages
        uses: actions/upload-artifact@v7
        with:
          name: skills
          path: dist/*.skill

  plugin:
    name: Claude plugin (validate + package)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history for git describe
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate plugin manifests
        run: |
          claude plugin validate .claude-plugin/plugin.json
          claude plugin validate .claude-plugin/marketplace.json
      - name: Determine version
        id: ver
        run: |
          v=$(git describe --tags --match 'v*' 2>/dev/null | sed 's/^v//')
          echo "version=${v:-0.0.0-dev}" >> "$GITHUB_OUTPUT"
      - name: Build plugin zip
        run: |
          mkdir -p dist
          # Stage just the plugin payload so the zip layout is deterministic.
          # Excludes JAR sources, stubs/, install.sh, marketplace.json — those
          # ride along in the GitHub-marketplace path but aren't needed when
          # uploading a single plugin to Cowork's "custom plugin file".
          STAGE=$(mktemp -d)
          mkdir -p "$STAGE/.claude-plugin"
          cp .claude-plugin/plugin.json "$STAGE/.claude-plugin/"
          cp .mcp.json LICENSE README.md "$STAGE/"
          cp -r skills "$STAGE/"
          find "$STAGE/skills" \
              \( -name __pycache__ -o -name .DS_Store -o -name evals \) \
              -exec rm -rf {} + 2>/dev/null || true
          ZIP="$GITHUB_WORKSPACE/dist/quantrix-tools-plugin-${{ steps.ver.outputs.version }}.zip"
          (cd "$STAGE" && zip -r "$ZIP" .)
          ls -lh dist/
      - name: Upload plugin zip
        uses: actions/upload-artifact@v7
        with:
          name: quantrix-tools-plugin
          path: dist/*.zip

  release:
    name: Release
    needs: [server-plugin, loader-plugin, skills, plugin]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: quantrix-server
          path: release/
      - uses: actions/download-artifact@v8
        with:
          name: groovy-loader-plugin
          path: release/
      - uses: actions/download-artifact@v8
        with:
          name: skills
          path: release/
      - uses: actions/download-artifact@v8
        with:
          name: quantrix-tools-plugin
          path: release/

      - name: Copy install script
        run: cp install.sh release/

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release/groovy-loader-plugin-*.jar
            release/quantrix-server-*.jar
            release/*.skill
            release/quantrix-tools-plugin-*.zip
            release/install.sh
